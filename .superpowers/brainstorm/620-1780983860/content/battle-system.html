<h2>战斗系统对比</h2>
<p class="subtitle">选择适合快节奏对战的战斗模式</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>回合制</h3>
      <p>双方轮流行动，有时间思考策略</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>策略性强</li><li>易于实现</li><li>适合新手</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>节奏较慢</li><li>等待时间长</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>实时对战</h3>
      <p>双方同时行动，考验反应速度</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>节奏快</li><li>刺激紧张</li><li>无等待时间</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>实现复杂</li><li>网络要求高</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合制</h3>
      <p>暗置阶段同时进行，行动阶段轮流执行</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>兼顾策略和节奏</li><li>减少等待时间</li><li>保留思考空间</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>规则稍复杂</li></ul></div>
      </div>
    </div>
  </div>
</div>
