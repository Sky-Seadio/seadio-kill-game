<h2>角色牌消耗机制</h2>
<p class="subtitle">对手的角色牌如何被消耗？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>直接消灭</h3>
      <p>攻击直接消灭对手角色牌</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>直观易懂</li><li>操作感强</li><li>节奏快</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>可能过于简单</li><li>缺乏策略深度</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>技能消耗</h3>
      <p>使用特定技能牌消耗对手角色牌</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>策略组合丰富</li><li>牌型配合</li><li>技能牌价值高</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>规则复杂</li><li>技能牌设计难度大</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>猜拳惩罚</h3>
      <p>猜拳失败方随机消耗一张角色牌</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>猜拳机制强化</li><li>心理博弈</li><li>快节奏</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>随机性大</li><li>可能运气成分过重</li></ul></div>
      </div>
    </div>
  </div>
</div>
