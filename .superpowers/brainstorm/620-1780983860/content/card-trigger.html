<h2>卡牌触发机制</h2>
<p class="subtitle">牌的效果如何触发？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>主动使用</h3>
      <p>玩家选择时机打出牌，消耗行动点</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>操作感强</li><li>时机博弈</li><li>策略自由度高</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>决策压力大</li><li>可能卡手</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>被动触发</h3>
      <p>满足条件自动触发（如：被攻击时自动防御）</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>操作简单</li><li>减少决策压力</li><li>意外惊喜感</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>策略感弱</li><li>运气成分大</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合制</h3>
      <p>部分牌主动使用，部分牌被动触发</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>兼顾操作感和惊喜</li><li>策略维度丰富</li><li>牌型差异化</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>规则稍复杂</li><li>需要平衡两类牌</li></ul></div>
      </div>
    </div>
  </div>
</div>
