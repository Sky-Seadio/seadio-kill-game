<h2>角色系统设计</h2>
<p class="subtitle">选择角色系统的核心机制</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>固定角色</h3>
      <p>每个玩家选择一个固定角色，拥有专属技能</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>角色精通感强</li><li>平衡性易控制</li><li>新手友好</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>策略维度单一</li><li>长期可能单调</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>卡牌角色</h3>
      <p>角色是卡牌，可以收集、切换、组合</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>收集乐趣</li><li>策略组合丰富</li><li>长期目标感</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>平衡性复杂</li><li>新手门槛高</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>双角色切换</h3>
      <p>每人带 2 个角色，可以自由切换上场</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>切换时机博弈</li><li>策略维度丰富</li><li>快节奏切换感</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>需要记忆两个角色</li><li>实现稍复杂</li></ul></div>
      </div>
    </div>
  </div>
</div>
