<h2>攻击机制设计</h2>
<p class="subtitle">攻击如何进行？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>直接攻击</h3>
      <p>猜拳赢家直接对对手角色造成伤害</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>简单直接</li><li>节奏快</li><li>易于理解</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>策略深度有限</li><li>缺乏目标选择</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>选择目标</h3>
      <p>猜拳赢家选择攻击对手的哪个角色</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>策略深度高</li><li>目标优先级</li><li>操作感强</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>决策压力大</li><li>可能分析瘫痪</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>随机攻击</h3>
      <p>猜拳赢家随机攻击对手一个角色</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>减少决策压力</li><li>增加随机性</li><li>快节奏</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>运气成分大</li><li>策略感弱</li></ul></div>
      </div>
    </div>
  </div>
</div>
