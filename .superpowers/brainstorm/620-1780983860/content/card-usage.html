<h2>手牌使用方式</h2>
<p class="subtitle">手牌如何使用？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>直接效果</h3>
      <p>打出手牌立即生效（如：攻击牌造成伤害）</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>简单直接</li><li>节奏快</li><li>易于理解</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>策略深度有限</li><li>一次性使用</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>角色装备</h3>
      <p>手牌装备到角色上，持续生效</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>策略深度高</li><li>角色成长感</li><li>长期规划</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>节奏较慢</li><li>可能装备过多</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合制</h3>
      <p>部分手牌直接使用，部分装备到角色</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>策略丰富</li><li>牌型差异化</li><li>灵活应对</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>规则复杂</li><li>需要平衡两类牌</li></ul></div>
      </div>
    </div>
  </div>
</div>
