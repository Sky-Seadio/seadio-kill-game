<h2>胜利条件设计</h2>
<p class="subtitle">如何判定胜负？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>消灭对手</h3>
      <p>将对手生命值降为 0</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>目标直观明确</li><li>经典对战体验</li><li>易于理解</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>可能过于暴力</li><li>策略单一化</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>达成目标</h3>
      <p>完成特定任务（如：收集3张同名牌、存活N回合）</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>策略多样化</li><li>非暴力体验</li><li>目标感强</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>目标设计复杂</li><li>可能偏离对战核心</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>资源耗尽</h3>
      <p>对手无牌可出或牌库耗尽时获胜</p>
      <div class="pros-cons">
        <div class="pros"><h4>优点</h4><ul><li>资源管理策略</li><li>持久战体验</li><li>卡牌游戏经典</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>可能拖沓</li><li>不符合快节奏</li></ul></div>
      </div>
    </div>
  </div>
</div>
